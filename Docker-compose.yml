# docker-compose.yml
version: "3.9"

services:
  ollama:
    image: ollama/ollama:latest
    container_name: facetbench_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: facetbench_api
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - MODEL_NAME=qwen2.5:7b
      - CHROMA_PATH=/app/data/chroma_db
    volumes:
      - ./data:/app/data
    depends_on:
      ollama:
        condition: service_healthy

  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    container_name: facetbench_ui
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:8000
    depends_on:
      - api

volumes:
  ollama_data:
